name: Build Linux + Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.300'

      - name: Restore
        run: dotnet restore FlipsiForge.slnx

      - name: Build (All Projects)
        run: dotnet build FlipsiForge.slnx -c Release --no-restore

      - name: Publish Server (linux-x64, self-contained)
        run: |
          dotnet publish src/FlipsiForge.Server/FlipsiForge.Server.csproj \
            -c Release -r linux-x64 --self-contained true \
            -p:PublishSingleFile=true -p:PublishTrimmed=false \
            -o dist/linux-server

      - name: Publish Desktop (linux-x64, self-contained)
        run: |
          dotnet publish src/FlipsiForge.Desktop/FlipsiForge.Desktop.csproj \
            -c Release -r linux-x64 --self-contained true \
            -p:PublishSingleFile=true -p:PublishTrimmed=false \
            -o dist/linux-desktop

      - name: Build MockMoonraker
        run: |
          dotnet publish src/FlipsiForge.MockMoonraker/FlipsiForge.MockMoonraker.csproj \
            -c Release -r linux-x64 --self-contained true \
            -p:PublishSingleFile=true \
            -o dist/linux-mockmoonraker

      - name: Create Server tar.gz
        run: tar -czf dist/FlipsiForge-Server-linux-x64.tar.gz -C dist/linux-server .

      - name: Create Desktop tar.gz
        run: tar -czf dist/FlipsiForge-Desktop-linux-x64.tar.gz -C dist/linux-desktop .

      - name: Create MockMoonraker tar.gz
        run: tar -czf dist/FlipsiForge-MockMoonraker-linux-x64.tar.gz -C dist/linux-mockmoonraker .

      - name: Upload Server Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlipsiForge-Server-linux-x64
          path: dist/FlipsiForge-Server-linux-x64.tar.gz

      - name: Upload Desktop Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlipsiForge-Desktop-linux-x64
          path: dist/FlipsiForge-Desktop-linux-x64.tar.gz

      - name: Upload MockMoonraker Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FlipsiForge-MockMoonraker-linux-x64
          path: dist/FlipsiForge-MockMoonraker-linux-x64.tar.gz