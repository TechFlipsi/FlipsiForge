name: Build Windows Installer + Portable

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.300'

      # === Installer Version (self-contained, single-file) ===
      - name: Publish Desktop (win-x64, self-contained)
        run: |
          dotnet publish src/FlipsiForge.Desktop/FlipsiForge.Desktop.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true -p:PublishTrimmed=false `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o dist/win-desktop

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Compile .exe Installer
        run: iscc installer/flipsiforge.iss

      # === Portable Version (.zip — kein Installer, einfach entpacken) ===
      - name: Create Portable .zip
        run: |
          dotnet publish src/FlipsiForge.Desktop/FlipsiForge.Desktop.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true -p:PublishTrimmed=false `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o dist/win-portable
          Compress-Archive -Path dist\win-portable\* -DestinationPath dist\FlipsiForge-0.4.1-win-x64-portable.zip -Force

      # === Upload to GitHub Release ===
      - name: Upload .exe Installer to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || 'v0.4.1' }}
          files: |
            dist/FlipsiForge-0.4.1-win-x64-setup.exe
            dist/FlipsiForge-0.4.1-win-x64-portable.zip
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Artifacts (fallback)
        uses: actions/upload-artifact@v4
        with:
          name: FlipsiForge-win-x64-builds
          path: |
            dist/FlipsiForge-0.4.1-win-x64-setup.exe
            dist/FlipsiForge-0.4.1-win-x64-portable.zip